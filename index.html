<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="BMS 国际贸易公司 100 个商标设计方案展示">
  <meta name="theme-color" content="#1B5E20">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="BMS商标">
  <title>BMS 商标设计方案 | 国际贸易公司</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <!-- ============================================
       Navigation Bar (Glassmorphism)
       ============================================ -->
  <nav class="navbar" id="navbar">
    <div class="navbar-inner">
      <a href="#" class="nav-brand" onclick="window.scrollTo({top:0,behavior:'smooth'});return false;">
        <div class="nav-brand-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5 12 2"/><line x1="12" y1="22" x2="12" y2="15.5"/><polyline points="22 8.5 12 15.5 2 8.5"/></svg>
        </div>
        <div class="nav-brand-text">BMS <span>商标设计</span></div>
      </a>

      <div class="nav-search">
        <svg class="nav-search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="search-input" placeholder="搜索方案名称、描述或编号..." autocomplete="off">
      </div>

      <div class="nav-actions">
        <button class="nav-btn" id="theme-toggle" title="切换暗色模式" aria-label="切换暗色模式">
          <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
        <button class="nav-btn" id="fav-toggle" title="收藏夹" aria-label="收藏夹">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          <span class="badge" id="fav-badge">0</span>
        </button>
      </div>
    </div>
  </nav>

  <!-- ============================================
       Hero Section
       ============================================ -->
  <section class="hero">
    <div class="hero-bg">
      <div class="hero-gradient"></div>
      <div class="hero-pattern"></div>
    </div>
    <div class="hero-content">
      <div class="hero-badge">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        国际贸易公司品牌标识
      </div>
      <h1 class="hero-title">BMS 商标设计方案</h1>
      <p class="hero-subtitle">100 个精心设计的品牌标识方案，涵盖通用风格、创始人故事、大师级设计、贸易核心、贸易场景与东方智慧六大系列</p>
      <div class="hero-stats">
        <div class="hero-stat">
          <span class="hero-stat-num" data-count="100">0</span>
          <span class="hero-stat-label">设计方案</span>
        </div>
        <div class="hero-stat-divider"></div>
        <div class="hero-stat">
          <span class="hero-stat-num" data-count="6">0</span>
          <span class="hero-stat-label">设计系列</span>
        </div>
        <div class="hero-stat-divider"></div>
        <div class="hero-stat">
          <span class="hero-stat-num" data-count="100">0</span>
          <span class="hero-stat-label">原创作品</span>
        </div>
      </div>
    </div>
  </section>

  <!-- ============================================
       Filter Bar
       ============================================ -->
  <div class="filter-bar" id="filter-bar">
    <div class="filter-bar-inner">
      <div class="filter-left">
        <span class="filter-label">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/></svg>
          筛选
        </span>
        <div id="filter-buttons"></div>
      </div>
      <div class="filter-right">
        <span class="result-info" id="result-info">共 <strong id="result-count">100</strong> 个方案</span>
        <button class="view-toggle" id="view-toggle" title="切换视图" aria-label="切换视图">
          <svg class="icon-grid" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          <svg class="icon-list" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- ============================================
       Main Content
       ============================================ -->
  <main class="main-content">
    <!-- Skeleton Loading -->
    <div class="card-grid" id="skeleton-grid">
      <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-body"><div class="skeleton-line w80"></div><div class="skeleton-line w50"></div><div class="skeleton-line w100"></div><div class="skeleton-line w90"></div></div></div>
      <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-body"><div class="skeleton-line w70"></div><div class="skeleton-line w60"></div><div class="skeleton-line w100"></div><div class="skeleton-line w85"></div></div></div>
      <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-body"><div class="skeleton-line w90"></div><div class="skeleton-line w50"></div><div class="skeleton-line w100"></div><div class="skeleton-line w75"></div></div></div>
      <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-body"><div class="skeleton-line w60"></div><div class="skeleton-line w70"></div><div class="skeleton-line w100"></div><div class="skeleton-line w80"></div></div></div>
      <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-body"><div class="skeleton-line w80"></div><div class="skeleton-line w50"></div><div class="skeleton-line w100"></div><div class="skeleton-line w90"></div></div></div>
      <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-body"><div class="skeleton-line w70"></div><div class="skeleton-line w60"></div><div class="skeleton-line w100"></div><div class="skeleton-line w85"></div></div></div>
      <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-body"><div class="skeleton-line w90"></div><div class="skeleton-line w50"></div><div class="skeleton-line w100"></div><div class="skeleton-line w75"></div></div></div>
      <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-body"><div class="skeleton-line w60"></div><div class="skeleton-line w70"></div><div class="skeleton-line w100"></div><div class="skeleton-line w80"></div></div></div>
    </div>

    <!-- Actual Card Grid -->
    <div class="card-grid" id="card-grid" style="display:none;"></div>
  </main>

  <!-- ============================================
       Footer
       ============================================ -->
  <footer class="footer">
    <div class="footer-inner">
      <div class="footer-brand">
        <div class="footer-logo">BMS</div>
        <div class="footer-company">国际贸易公司</div>
      </div>
      <div class="footer-divider"></div>
      <p class="footer-text">
        &copy; 2025 BMS International Trading Co. &mdash; 商标设计方案展示
      </p>
      <div class="footer-badges">
        <span class="footer-badge">PWA</span>
        <span class="footer-badge">Offline</span>
        <span class="footer-badge">100 Schemes</span>
      </div>
    </div>
  </footer>

  <!-- ============================================
       Modal (大图预览)
       ============================================ -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal-content"></div>
  </div>

  <!-- ============================================
       Favorites Panel (收藏夹侧边栏)
       ============================================ -->
  <div class="fav-overlay" id="fav-overlay"></div>
  <div class="fav-panel" id="fav-panel">
    <div class="fav-panel-header">
      <h2 class="fav-panel-title">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        我的收藏
        <span class="fav-count" id="fav-panel-count">0</span>
      </h2>
      <button class="fav-panel-close" id="fav-panel-close" aria-label="关闭收藏夹">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="fav-panel-body" id="fav-panel-body"></div>
  </div>

  <!-- ============================================
       Back to Top
       ============================================ -->
  <button class="back-to-top" id="back-to-top" title="返回顶部" aria-label="返回顶部">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
  </button>

  <!-- ============================================
       Scripts
       ============================================ -->
  <script src="./app.js"></script>
</body>
</html>
